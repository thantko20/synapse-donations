version: "3.8"

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: synapse-donations-test-db
    environment:
      POSTGRES_DB: synapse_donations_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432" # Different port to avoid conflicts with dev database
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d synapse_donations_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c logging_collector=off

volumes:
  postgres_test_data:
    driver: local

networks:
  default:
    name: synapse-donations-test
